services:
  - type: worker
    name: ducks-telegram-bot
    runtime: docker
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: API_TIMEOUT_SECONDS
        value: "10"
      - key: USER_LINKS_PATH
        value: /app/data/user_links.json
      - key: LOG_LEVEL
        value: INFO
